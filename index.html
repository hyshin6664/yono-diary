<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>윤오 일기</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif;background:linear-gradient(135deg,#fef3c7 0%,#fde68a 30%,#fbbf24 60%,#f59e0b 100%);color:#1c1917;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2vh 2vw;position:relative;overflow:hidden}
body::before{content:"";position:fixed;inset:-10%;z-index:-1;background:radial-gradient(circle at 15% 25%,rgba(255,255,255,.7),transparent 35%),radial-gradient(circle at 85% 75%,rgba(255,200,100,.5),transparent 40%),radial-gradient(circle at 50% 50%,rgba(254,243,199,.4),transparent 60%);filter:blur(40px);animation:drift 20s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(3%,-2%) scale(1.05)}}
.tabs{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.tab{font-family:inherit;font-size:clamp(13px,1.5vw,17px);font-weight:900;padding:10px 22px;border:2px solid rgba(217,119,6,.4);border-radius:999px;cursor:pointer;background:rgba(255,251,233,.85);color:#9a3412;box-shadow:0 4px 12px rgba(146,64,14,.15);transition:transform .15s,box-shadow .2s,background .2s,color .2s}
.tab:hover{transform:translateY(-2px)}
.tab.on{background:linear-gradient(135deg,#ea580c,#dc2626);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(220,38,38,.35)}
.paper{width:min(96vw,1200px);height:min(86vh,820px);background:#fffbe9;border-radius:24px;box-shadow:0 25px 60px rgba(146,64,14,.25),0 0 0 8px rgba(255,255,255,.6),inset 0 0 0 2px rgba(217,119,6,.15);padding:clamp(20px,3.5vh,40px) clamp(30px,4vw,60px);display:flex;flex-direction:column;position:relative;background-image:repeating-linear-gradient(transparent,transparent calc(1em * 1.9 - 1px),rgba(2,132,199,.1) calc(1em * 1.9 - 1px),rgba(2,132,199,.1) calc(1em * 1.9));background-size:100% calc(1em * 1.9)}
.paper::before{content:"";position:absolute;left:48px;top:0;bottom:0;border-left:2px solid rgba(220,38,38,.35)}
.header{display:flex;align-items:baseline;gap:clamp(12px,2vw,24px);margin-bottom:clamp(10px,1.5vh,20px);padding-bottom:clamp(8px,1.5vh,16px);border-bottom:3px dashed rgba(217,119,6,.4);flex-wrap:wrap}
.date{font-size:clamp(15px,1.6vw,20px);font-weight:700;color:#92400e;letter-spacing:.5px}
.date .weather{margin-left:8px;background:rgba(254,243,199,.9);padding:2px 12px;border-radius:999px;font-size:.85em;color:#7c2d12}
.title{font-size:clamp(26px,4.2vw,48px);font-weight:900;color:#7c2d12;letter-spacing:-1.5px;margin-left:auto;text-shadow:2px 2px 0 rgba(255,255,255,.8),3px 3px 0 rgba(217,119,6,.15)}
.title .emoji{margin-right:8px}
.body{flex:1;font-size:clamp(17px,2vw,26px);line-height:1.9;color:#1c1917;font-weight:500;letter-spacing:-.3px;padding:clamp(8px,1.5vh,16px) 0;overflow:auto;display:flex;align-items:center}
.body p{text-align:justify;word-break:keep-all;outline:none;border-radius:10px;padding:6px 10px;margin:-6px -10px;transition:background .25s,box-shadow .25s;width:100%;white-space:pre-line}
.body p[contenteditable="true"]{background:rgba(254,240,138,.6);box-shadow:0 0 0 3px rgba(234,179,8,.4),inset 0 0 0 2px rgba(217,119,6,.3);cursor:text}
.body p[contenteditable="true"]:focus{background:rgba(254,240,138,.85);box-shadow:0 0 0 4px rgba(234,179,8,.6)}
.footer{display:flex;align-items:center;justify-content:space-between;padding-top:clamp(8px,1.5vh,14px);border-top:2px solid rgba(217,119,6,.25);gap:10px;flex-wrap:wrap}
.count{font-size:clamp(13px,1.4vw,17px);color:#9a3412;font-weight:800;background:rgba(254,243,199,.95);padding:6px 16px;border-radius:999px;border:1.5px solid rgba(217,119,6,.4);transition:background .25s,transform .25s}
.count b{color:#dc2626;font-size:1.1em;margin:0 3px}
.count.pulse{background:rgba(254,240,138,1);transform:scale(1.08)}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:clamp(12.5px,1.35vw,16px);font-weight:900;padding:9px 18px;border:none;border-radius:999px;cursor:pointer;box-shadow:0 5px 14px rgba(0,0,0,.18);transition:transform .15s,box-shadow .2s,background .2s;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px;color:#fff}
.btn:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 9px 20px rgba(0,0,0,.25)}
.btn-edit{background:linear-gradient(135deg,#0284c7,#7c3aed)}
.btn-edit.on{background:linear-gradient(135deg,#ea580c,#dc2626);animation:editPulse 2s ease-in-out infinite}
@keyframes editPulse{0%,100%{box-shadow:0 5px 14px rgba(220,38,38,.4)}50%{box-shadow:0 5px 22px rgba(220,38,38,.7)}}
.btn-tts{background:linear-gradient(135deg,#16a34a,#22c55e);width:clamp(42px,4.2vw,54px);height:clamp(42px,4.2vw,54px);padding:0;border-radius:50%;justify-content:center;font-size:clamp(15px,1.7vw,20px);line-height:1}
.btn-tts.on{background:linear-gradient(135deg,#dc2626,#ea580c);animation:editPulse 1.6s ease-in-out infinite}
.btn-tts #ttsLabel{margin-left:2px}
.btn-tts.on #ttsLabel{margin-left:0}
.btn-send{background:linear-gradient(135deg,#f59e0b,#d97706)}
.btn-send.done{background:linear-gradient(135deg,#16a34a,#22c55e)}
.toast{position:fixed;top:32px;left:50%;transform:translateX(-50%) translateY(-120px);background:#0f172a;color:#fff;padding:14px 28px;border-radius:14px;font-weight:900;font-size:16px;box-shadow:0 14px 36px rgba(0,0,0,.4);transition:transform .35s cubic-bezier(.18,.89,.32,1.28);z-index:100;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.edit-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#dc2626,#ea580c,#dc2626);color:#fff;text-align:center;padding:6px 14px;font-size:13px;font-weight:900;letter-spacing:.5px;transform:translateY(-100%);transition:transform .3s;z-index:50;box-shadow:0 4px 14px rgba(220,38,38,.4)}
.edit-banner.show{transform:translateY(0)}
.saved-flag{font-size:.8em;color:#16a34a;margin-left:8px}
@media (max-width:640px){
  html,body{height:auto;min-height:100%;overflow:visible;overflow-x:hidden}
  body{display:block;padding:12px}
  body::before{display:none}
  .tabs{margin-bottom:12px}
  .tab{font-size:14px;padding:10px 18px}
  .paper{width:auto;height:auto;min-height:0;border-radius:16px;padding:18px 16px;display:block;background-size:100% 1.8em}
  .paper::before{display:none}
  .header{flex-direction:column;align-items:flex-start;gap:6px;margin-bottom:14px;padding-bottom:12px}
  .title{font-size:25px;margin-left:0;letter-spacing:-1px}
  .date{font-size:15px}
  .body{display:block;flex:none;overflow:visible;font-size:18px;line-height:1.85;padding:6px 0;align-items:flex-start}
  .body p{text-align:left}
  .footer{flex-direction:column;align-items:stretch;gap:10px;margin-top:16px}
  .btns{justify-content:flex-start}
  .btn{font-size:14px;padding:11px 16px;flex:1;justify-content:center}
  .btn-tts{flex:0 0 auto;width:48px;height:48px;font-size:18px}
  .count{font-size:14px;text-align:center}
}
</style>
</head>
<body>
<div class="edit-banner" id="editBanner">✏ 편집 모드 — 본문을 직접 고치세요. 다 고치면 「💾 저장」을 누르세요</div>

<div class="tabs" id="tabs"></div>

<div class="paper">
  <div class="header">
    <div class="date" id="dateBox">📅 <span id="dateText"></span> <span class="weather" id="weatherText"></span></div>
    <div class="title" id="titleText"></div>
  </div>
  <div class="body">
    <p id="bodyText"></p>
  </div>
  <div class="footer">
    <div class="count" id="countBox">✏ 본문 글자 수 (띄어쓰기 제외) : <b id="countNum">0</b>자<span class="saved-flag" id="savedFlag"></span></div>
    <div class="btns">
      <button class="btn btn-edit" id="editBtn"><span id="editLabel">✏ 편집하기</span></button>
      <button class="btn btn-tts" id="ttsBtn" title="읽어주기" aria-label="읽어주기"><span id="ttsLabel">▶</span></button>
      <button class="btn btn-send" id="sendBtn"><span id="sendLabel">📤 아빠한테 보내기</span></button>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ 저장됐어요!</div>

<script>
// ====== 일기 원본 (수정본은 이 폰 안에 자동 저장됨) ======
var DIARIES = [
  {
    id:'r20260531',
    date:'2026년 5월 31일 일요일',
    weather:'☀ 맑음',
    title:'📖 탐정 포오 · 누가 진짜 탐정 포오?!',
    text:'그러고 맛집이 있는 데로 갔다. 골뱅이가 나왔다. 그러고 먹기 시작했는데 타키 앞에 있는 거는 포오가 아니었다. 그런데 괴도 물음표가 거짓말을 했다. 자기가 포오인데 하고 우겼다.\n\n그런데 진짜 진짜 포오가 와서 괴도 물음표를 잡았다. 변장을 한 거라고 했다. 변장을 벗겨 봤더니 괴도 물음표였다. 그러고 여긴 디저트가 엄청 맛있으니까 꼭 먹어 보라고 하고 물을 뿌리고 도망쳤다.\n\n괴도 물음표는 포오한테 선물을 주었다. 포오 그림을 주었다. 그러고 괴도 물음표가 말한 대로 디저트를 먹어 봤다. 엄청 맛있었다. 그러고 파리 시내에서 가장 높은 곳인 몽마르트르로 갔다.'
  },
  {
    id:'r20260530',
    date:'2026년 5월 30일 토요일',
    weather:'☀ 맑음',
    title:'📖 탐정 포오 · 반짝반짝 거울의 방',
    text:'포오가 어떤 여자랑 싸웠다. 타키가 왜 그러냐고 묻자 포오는 저 여자가 괴도 물음표라고 했다. 포오는 자기가 개코인 걸 잘 알지 않냐고 하면서, 아까 자기한테 청양고추를 먹인 사람이 바로 괴도 물음표라고 했다.\n\n그 여자는 박물관에서 크레페를 사 먹었다고 했다. 포오는 그 여자가 아닌 척하는 걸 알고 사진을 찍었다. 그런데 보니까 물음표 파스가 붙어 있었다. 그 여자가 괴도 물음표였던 거다.\n\n그리고 돋보기랑 태양도 있었다. 어떤 정원에 와 봤더니 엄청 반짝반짝했다. 타키가 가방을 뒤적뒤적하더니 어 하고 놀랐다. 그러고 포오가 한 명 더 왔다. 그런데 타키가 없어졌다.'
  },
  {
    id:'d20260529',
    date:'2026년 5월 29일 금요일',
    weather:'☀ 맑음',
    title:'🚶 효재랑 같이 간 날',
    text:'오늘 학교에 갔는데 효재가 학교가 끝나고 같이 가자고 해서 나도 같이 가기로 했다. 점심을 먹고 피구를 하려고 했지만 시간이 없어서 못 했다. 그리고 5교시에 선생님과 피구를 했다. 그런데 안시율이 잘하는 친구들을 다 데리고 갔다. 그래도 우리 팀에도 잘하는 친구들이 몇 명 있었다. 첫 판은 이겼지만 둘째 판과 셋째 판은 모두 졌다. 그래서 아쉬웠다.\n\n집에 갈 시간이 되었다. 효재와 둘이 같이 가는 것은 처음이라 엄청 기대됐다. 어디서 내릴지 이야기하다가 효재가 나와 같이 내리기로 했다.\n\n집에 와서 학원 숙제를 했다. 그 후 학원에 갔다가 검도를 하러 갔는데 다 같이 피구를 했다. 피구를 하다가 철에 부딪혀 멍이 들었다. 집에 와서 보니 멍이 엄청 커져 있어서 깜짝 놀랐다.'
  },
  {
    id:'d20260521',
    date:'2026년 5월 21일 목요일',
    weather:'☀ 맑음',
    title:'🎬 4D 영화',
    text:'오늘 4D 마리오 갤럭시 영화를 보러 갔다. 늦게 출발했는데 영화 시간에는 늦지 않았다.\n\n1층을 구경했는데 미니 자동차와 건담 등 신기한 것들이 많았다. 엄마와 아빠가 4D 영화는 물이 나온다고 해서 기대됐다. 그런데 물이 조금만 나와서 아쉬웠다. 의자가 움직여서 신기했다.\n\n영화가 끝나고 점심을 먹고 숙제를 하다가 롯데아울렛에 갔다. 새로 나온 메탈카드봇이 멋있어서 사고 싶었는데 엄마가 안 된다고 했다. 아빠는 전동 물총을 갖고 싶다고 했는데 내가 그건 빨리 고장 난다고 했다.\n\n그곳에 닌텐도 마리오 2가 있어서 체험해 봤다. 그리고 내일 먹을 음식을 샀다. 바닷가에 가려고 했는데 너무 늦어서 못 갔다. 그래서 우리는 그냥 집으로 왔다.'
  }
];
var LS_KEY='yono-diary-edits-v2';

// ====== 가족 공유 저장소 (한 번만 아빠가 만들어 주소만 넣으면 됨) ======
// 비어 있으면 = 지금처럼 이 폰에만 저장. 주소를 넣으면 = 가족 모두 같은 내용 자동 동기화.
// 예시: 'https://yono-diary-xxxx-default-rtdb.firebaseio.com/edits'
var SYNC_URL='';

(function(){
  var tabsEl=document.getElementById('tabs'),dateText=document.getElementById('dateText'),weatherText=document.getElementById('weatherText'),titleText=document.getElementById('titleText'),
      bodyEl=document.getElementById('bodyText'),countNum=document.getElementById('countNum'),countBox=document.getElementById('countBox'),savedFlag=document.getElementById('savedFlag'),
      editBtn=document.getElementById('editBtn'),editLabel=document.getElementById('editLabel'),editBanner=document.getElementById('editBanner'),
      ttsBtn=document.getElementById('ttsBtn'),ttsLabel=document.getElementById('ttsLabel'),
      sendBtn=document.getElementById('sendBtn'),sendLabel=document.getElementById('sendLabel'),toast=document.getElementById('toast');
  var cur=0,editing=false,speaking=false;

  // 저장된 수정본 불러오기 (이 폰)
  var edits={};
  try{ edits=JSON.parse(localStorage.getItem(LS_KEY)||'{}')||{}; }catch(e){ edits={}; }
  function applyEdits(){ DIARIES.forEach(function(d){ var e=edits[d.id]; if(e&&e.text){ d.text=e.text; d.edited=true; } }); }
  applyEdits();
  var synced=!!SYNC_URL;  // 공유 저장소 주소가 있으면 가족 동기화 ON

  // 공유 저장소에서 최신본 가져오기 (가족 모두 같은 버전)
  function pullShared(cb){
    if(!synced){ if(cb)cb(); return; }
    fetch(SYNC_URL+'.json?_='+Date.now()).then(function(r){return r.ok?r.json():null;}).then(function(srv){
      if(srv){
        Object.keys(srv).forEach(function(id){
          var s=srv[id]; if(!s||!s.text) return;
          var local=edits[id];
          // 더 최근에 저장된 쪽을 정본으로 (시간 비교)
          if(!local||!local.savedAt||(s.savedAt&&s.savedAt>local.savedAt)){ edits[id]={text:s.text,savedAt:s.savedAt}; }
        });
        try{ localStorage.setItem(LS_KEY,JSON.stringify(edits)); }catch(e){}
        applyEdits();
      }
      if(cb)cb();
    }).catch(function(){ if(cb)cb(); });
  }

  function countChars(t){return (t||'').replace(/\s/g,'').length}
  function pulseCount(n){countNum.textContent=n;countBox.classList.add('pulse');setTimeout(function(){countBox.classList.remove('pulse')},500)}
  function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(function(){toast.classList.remove('show')},2800)}
  function titleEmoji(t){var m=(t||'').match(/^\s*(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);return m?m[0]:'';}
  function plainTitle(t){return (t||'').replace(/^\s*(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/u,'').trim();}

  function persist(){
    var d=DIARIES[cur];
    var rec={text:d.text,savedAt:new Date().toISOString()};
    edits[d.id]=rec;
    try{ localStorage.setItem(LS_KEY,JSON.stringify(edits)); }catch(e){}
    d.edited=true;
    // 공유 저장소에도 올려서 가족 모두 같은 버전 보이게
    if(synced){
      try{ fetch(SYNC_URL+'/'+d.id+'.json',{method:'PUT',body:JSON.stringify(rec)}).catch(function(){}); }catch(e){}
    }
  }

  function render(){
    var d=DIARIES[cur];
    Array.prototype.forEach.call(tabsEl.children,function(b,i){b.classList.toggle('on',i===cur)});
    dateText.textContent=d.date;
    weatherText.textContent=d.weather||'';
    var em=titleEmoji(d.title);var rest=plainTitle(d.title);
    titleText.innerHTML=em?('<span class="emoji">'+em+'</span>'+rest):d.title;
    bodyEl.textContent=d.text;
    savedFlag.textContent=d.edited?(synced?'· 가족 모두에게 저장됨 ✓':'· 이 폰에 저장됨 ✓'):'';
    pulseCount(countChars(d.text));
  }

  function buildTabs(){
    DIARIES.forEach(function(d,i){
      var b=document.createElement('button');b.className='tab';
      var md=(d.date||'').match(/(\d+)월\s*(\d+)일/);
      var lab=md?(md[1]+'/'+md[2]):('일기 '+(i+1));
      b.textContent=lab+' · '+plainTitle(d.title);
      b.addEventListener('click',function(){if(i===cur)return;if(editing){endEdit(true);}cur=i;render();});
      tabsEl.appendChild(b);
    });
  }

  function startEdit(){
    editing=true;bodyEl.contentEditable='true';bodyEl.focus();
    editBtn.classList.add('on');editLabel.textContent='💾 저장';editBanner.classList.add('show');
    var range=document.createRange();range.selectNodeContents(bodyEl);range.collapse(false);
    var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  }
  function endEdit(silent){
    editing=false;bodyEl.contentEditable='false';editBtn.classList.remove('on');editLabel.textContent='✏ 편집하기';editBanner.classList.remove('show');
    var d=DIARIES[cur];
    var newText=bodyEl.textContent.replace(/ /g,' ').replace(/[ \t]+\n/g,'\n').trim();
    d.text=newText;persist();
    var n=countChars(newText);pulseCount(n);savedFlag.textContent=synced?'· 가족 모두에게 저장됨 ✓':'· 이 폰에 저장됨 ✓';
    if(!silent) showToast(synced?('💾 저장 완료! 가족 모두에게 반영됐어요 ('+n+'자)'):('💾 이 폰에 저장됐어요 ('+n+'자) · 가족에게 보내려면 📤'));
  }
  editBtn.addEventListener('click',function(){ if(!editing){startEdit();}else{endEdit(false);} });
  bodyEl.addEventListener('input',function(){if(editing){countNum.textContent=countChars(bodyEl.textContent)}});

  function findKoreanVoice(){var v=window.speechSynthesis.getVoices();var p=v.find(function(x){return x.lang==='ko-KR'&&/Natural|Premium|Online|Siri|Yuna/i.test(x.name)});if(p)return p;var k=v.find(function(x){return x.lang==='ko-KR'});return k||v.find(function(x){return x.lang.indexOf('ko')===0})}
  ttsBtn.addEventListener('click',function(){
    if(speaking){window.speechSynthesis.cancel();return}
    if(!('speechSynthesis' in window)){showToast('⚠ 이 폰은 음성 읽기를 지원하지 않아요');return}
    var u=new SpeechSynthesisUtterance(bodyEl.textContent.trim());u.lang='ko-KR';u.rate=0.95;u.pitch=1.05;u.volume=1;
    var vc=findKoreanVoice();if(vc)u.voice=vc;
    u.onstart=function(){speaking=true;ttsBtn.classList.add('on');ttsLabel.textContent='⏸'};
    u.onend=u.onerror=function(){speaking=false;ttsBtn.classList.remove('on');ttsLabel.textContent='▶'};
    window.speechSynthesis.speak(u);
  });
  if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=function(){}}

  // 📤 아빠한테 보내기 — 폰 공유시트(카톡/문자)로 수정본 + 글자 수 전송
  sendBtn.addEventListener('click',function(){
    if(editing){endEdit(true);}
    var d=DIARIES[cur];var n=countChars(d.text);
    var msg='[윤오 일기 수정본]\n'+d.date+' ('+plainTitle(d.weather||'').replace(/[^가-힣]/g,'')+')\n제목 : '+plainTitle(d.title)+'\n글자 수(띄어쓰기 제외) : '+n+'자\n\n'+d.text;
    function done(){sendBtn.classList.add('done');sendLabel.textContent='✓ 보냈어요!';setTimeout(function(){sendBtn.classList.remove('done');sendLabel.textContent='📤 아빠한테 보내기'},3000)}
    if(navigator.share){
      navigator.share({title:'윤오 일기 수정본',text:msg}).then(done).catch(function(){ copyText(msg,function(){showToast('📋 복사됐어요! 카톡에 붙여넣어 보내주세요');done();}); });
    }else{
      copyText(msg,function(){showToast('📋 복사됐어요! 카톡에 붙여넣어 보내주세요');done();});
    }
  });
  function copyText(text,cb){
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(cb).catch(function(){fallbackCopy(text,cb)})}
    else{fallbackCopy(text,cb)}
  }
  function fallbackCopy(text,cb){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy')}catch(e){}ta.remove();cb()}

  if(!DIARIES.length){bodyEl.textContent='일기를 불러오지 못했어요.';return}
  buildTabs();render();

  // 가족 동기화: 처음에 최신본 한 번 + 이후 자동으로 새로고침해서 상대방 저장분 가져오기
  if(synced){
    pullShared(function(){ render(); });
    setInterval(function(){ if(editing) return; pullShared(function(){ if(!editing) render(); }); }, 4000);
    document.addEventListener('visibilitychange',function(){ if(!document.hidden&&!editing) pullShared(function(){ if(!editing) render(); }); });
  }
})();
</script>
</body>
</html>
